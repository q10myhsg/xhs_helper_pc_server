name: Build Cross-Platform

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --clean --name xhs_helper --onefile --console --noupx \
          --add-data "templates;templates" \
          --add-data "static;static" \
          --add-data "config;config" \
          --add-data "resources;resources" \
          --add-data "create_notes;create_notes" \
          --add-data "xhs_nurturing;xhs_nurturing" \
          --hidden-import "flask" \
          --hidden-import "werkzeug" \
          --hidden-import "uiautomator2" \
          --hidden-import "PIL" \
          --hidden-import "bs4" \
          --hidden-import "lxml" \
          --hidden-import "xhs_nurturing" \
          --hidden-import "create_notes" \
          --hidden-import "license_manager" \
          --hidden-import "machine_code" \
          --hidden-import "pdf_converter" \
          --hidden-import "file_transfer" \
          --hidden-import "config_manager" \
          --hidden-import "db_manager" \
          --hidden-import "utils" \
          app.py

    - name: Create release package
      run: |
        mkdir -p release
        if [ "${{ runner.os }}" == "Windows" ]; then
          VERSION_DIR="xhs_helper_v1.0.0_windows_x64"
          mkdir release/$VERSION_DIR
          copy dist\xhs_helper.exe release\$VERSION_DIR\
          echo "# xhs_helper v1.0.0" > release/$VERSION_DIR/README.md
          echo "## Windows 版本" >> release/$VERSION_DIR/README.md
          echo "## 使用方法: 双击 xhs_helper.exe" >> release/$VERSION_DIR/README.md
          powershell Compress-Archive -Path release\$VERSION_DIR -DestinationPath release\$VERSION_DIR.zip
        else
          VERSION_DIR="xhs_helper_v1.0.0_${{ runner.os }}_$(uname -m)"
          mkdir release/$VERSION_DIR
          cp dist/xhs_helper release/$VERSION_DIR/
          echo "# xhs_helper v1.0.0" > release/$VERSION_DIR/README.md
          echo "## ${{ runner.os }} 版本" >> release/$VERSION_DIR/README.md
          echo "## 使用方法: chmod +x xhs_helper && ./xhs_helper" >> release/$VERSION_DIR/README.md
          zip -r release/$VERSION_DIR.zip release/$VERSION_DIR
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: xhs_helper-${{ runner.os }}
        path: release/
