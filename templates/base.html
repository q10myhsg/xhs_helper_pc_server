<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红薯助手-pc端</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-brand">🚀 红薯助手-pc端</div>
        <ul class="navbar-nav">
            <li class="nav-item"><a href="/dashboard" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">仪表板</a></li>
            <li class="nav-item"><a href="/nurturing" class="nav-link {% if active_page == 'nurturing' %}active{% endif %}">养号配置</a></li>
            <li class="nav-item"><a href="/keyword" class="nav-link {% if active_page == 'keyword' %}active{% endif %}">关键词</a></li>
            <li class="nav-item"><a href="/pdf" class="nav-link {% if active_page == 'pdf' %}active{% endif %}">PDF转图片</a></li>
            <li class="nav-item"><a href="/cover-generator" class="nav-link {% if active_page == 'cover-generator' %}active{% endif %}">封面生成</a></li>
            <li class="nav-item"><a href="/file-transfer" class="nav-link {% if active_page == 'file-transfer' %}active{% endif %}">文件传输</a></li>
            <li class="nav-item"><a href="/activation" class="nav-link {% if active_page == 'activation' %}active{% endif %}">激活</a></li>
        </ul>
    </nav>
    <!-- 主内容区 -->
    <div class="container">
        <div class="main-content">
            {% block content %}{% endblock %}
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
